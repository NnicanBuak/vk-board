services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boarduser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vk-board}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-boarduser} -d ${POSTGRES_DB:-vk-board}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_REPO}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-boarduser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vk-board}
      JWT_SECRET: ${JWT_SECRET}
      VK_SECRET: ${VK_SECRET}
      FRONTEND_URL: https://${DOMAIN}
      PORT: 3001
      NODE_ENV: production
      LOG_DIR: /app/logs
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/${GITHUB_REPO}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot
    depends_on:
      backend:
        condition: service_healthy

  # Automatic SSL renewal every 12 hours
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  pgdata:
  certbot-www:

