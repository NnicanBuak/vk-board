name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          script: |
            set -e

            if [ ! -d /opt/vk-mini-app ]; then
              git clone https://github.com/${{ github.repository }} /opt/vk-mini-app
            fi

            cd /opt/vk-mini-app
            git pull origin ${{ github.ref_name }}

            cat > server/.env <<EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            VK_SECRET=${{ secrets.VK_SECRET }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            PORT=3001
            NODE_ENV=production
            EOF

            cd server
            npm ci --omit=dev
            npm run build
            npx prisma migrate deploy

            pm2 describe vk-board-api > /dev/null 2>&1 \
              && pm2 restart vk-board-api \
              || pm2 start dist/index.js --name vk-board-api
            pm2 save
