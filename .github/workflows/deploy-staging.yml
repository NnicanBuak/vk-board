name: Deploy — Staging

on:
  push:
    branches: [dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: server

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: server
