name: Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image names
        run: |
          echo "BACKEND_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/frontend" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend.prod
          push: true
          build-args: |
            VITE_VK_APP_ID=${{ secrets.VITE_VK_APP_ID }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: /opt/vk-board

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/vk-board

            # Update image tag in .env.prod
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ github.sha }}|" .env.prod

            # Pull new images
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull backend frontend

            # Zero-downtime backend restart
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps backend

            # Wait for backend health (up to 60s)
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T backend curl -sf http://localhost:3001/api/health >/dev/null 2>&1; then
                echo "Backend healthy"
                break
              fi
              [ $i -eq 30 ] && echo "ERROR: backend timeout" && exit 1
              sleep 2
            done

            # Graceful frontend reload
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps frontend
            sleep 2
            docker compose -f docker-compose.prod.yml exec -T frontend nginx -s reload 2>/dev/null || true

            echo "Deploy complete: ${{ github.sha }}"
